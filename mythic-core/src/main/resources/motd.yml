# Server-list MOTD shown when Minecraft clients ping the proxy.
#
# Each connection picks a random line from line1 and a random line from
# line2 (independently), so you can keep one line "branded" and rotate
# the second line through promos / events.
#
# Color tags follow MythicHex (&#RRGGBB, &l for bold, &o italic, etc).
# Only the "MythicPvP" wordmark is bolded; &r is used to reset bold
# before the trailing flavour text so it renders as a regular weight.
#
# motd.hover is the multi-line tooltip Minecraft shows when a player
# hovers over the player count on their server list. Lines are sent
# as fake "online player" entries. Supports %online% and %max%.
#
# Player count shown on the server list is the NETWORK-wide presence
# (all shards), not just this shard. Set hide-player-count: true to
# hide it entirely. Set max-players-override to a positive number to
# override the displayed slot count (cosmetic only).

motd:
  line1:
    - "&#F529BE&lM&#FD37F0&ly&#F639EA&lt&#DD35C4&lh&#F63DF1&li&#EA21FF&lc&#FFFFFF&lPvP&r &#D2D8E0&o— A new era of Minecraft —"
    - "&#F529BE&lMythicPvP&r &#9CC3FF⚔ &#D2D8E0&o— Forge your legend —"
    - "&#F529BE&lMythicPvP&r &#FFEC8A✦ &#D2D8E0&onow live"
  line2:
    - "&#9CC3FFplay.mythicpvp.net &8| &#FFEC8ASkyblock &8• &#FF8A8APvP &8• &#9CFF9CHub"
    - "&#9CC3FFplay.mythicpvp.net &8| &#FFEC8AJoin our Discord: &#9CC3FFdiscord.gg/mythicpvp"
    - "&#9CFF9C⟶ &#FFFFFFNew season &#9CFF9Cstarts &#FFEC8AThis Weekend &#9CFF9C⟵"
  hover:
    - "&#F529BE&lMYTHIC&#FFFFFF&lPVP"
    - "&7"
    - "&#9CC3FFSTORE &8» &#FFFFFFstore.mythicpvp.net"
    - "&#9CC3FFDISCORD &8» &#FFFFFFdiscord.gg/mythicpvp"
    - "&#9CC3FFWEBSITE &8» &#FFFFFFwww.mythicpvp.net"
    - "&7"
    - "&7Network online: &#9CFF9C%online%"
  hide-player-count: false
  max-players-override: 0
