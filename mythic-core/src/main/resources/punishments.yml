punishments:
  default-reason: "No reason specified"
  silent-flag: "-s"
  notify-staff-permission: "mythic.core.punish.notify"
  commands:
    ban: "mythic.core.punish.ban"
    tempban: "mythic.core.punish.tempban"
    mute: "mythic.core.punish.mute"
    tempmute: "mythic.core.punish.tempmute"
    warn: "mythic.core.punish.warn"
    history: "mythic.core.punish.history"
  templates:
    general-warning:
      category: "WARN"
      duration: "permanent"
      title: "General Warning"
      information: "Used for minor rule reminders."
    chat-offense-1:
      category: "MUTE"
      duration: "1d"
      title: "Chat Offense #1"
      information: "First chat offense."
    cheating-1:
      category: "BAN"
      duration: "30d"
      title: "Cheating #1"
      information: "First cheating offense."
    network-removal:
      category: "BLACKLIST"
      duration: "permanent"
      title: "Network Removal"
      information: "Severe network-level punishment."
