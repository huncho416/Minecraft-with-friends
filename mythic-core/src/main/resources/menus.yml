# Operator-facing text for the staff menus.
#
# Tokens supported:
#   %target%   - name of the player being acted on (when applicable)
#   %category% - punishment category name
#
# Colours use the suite-hex convention: &#RRGGBB for hex, &7/&f/etc for legacy.
punishment:
  punish-title: "&#F529BEPunish&8: &#FFFFFF%target%"
  handbook-title: "&#F529BEPunishments"
  templates-title: "&#F529BE%category%"
  proof-title: "&#F529BEPunishment Proof"
  confirm-title: "&#F529BEConfirm Punishment"
  history-title: "&#F529BEHistory&8: &#FFFFFF%target%"
  category-button:
    name: "&#F529BE%category%"
    lore-templates: "&7View templates"
    lore-handbook: "&7Open handbook category"
  template-click:
    executable: "&#F529BEClick to select"
    handbook: "&#D2D8E0Read-only handbook entry"
  buttons:
    enter-proof: "&#F529BEEnter Proof"
    enter-proof-lore: "&7Click to enter proof in chat"
    proof-summary: "&#F529BEProof"
    no-proof-yet: "&7No proof entered"
    no-proof-button: "&#FF8A8ANo proof entered"
    confirm-proof: "&#9CFF9CConfirm Proof"
    clear-inventory: "&#F529BEClear Inventory"
    silent: "&#F529BESilent"
    summary: "&#F529BEPunishment Summary"
    execute: "&#9CFF9CExecute Punishment"
    state-prefix: "&7State: &f"
    toggle-hint: "&#F529BEClick to toggle"

