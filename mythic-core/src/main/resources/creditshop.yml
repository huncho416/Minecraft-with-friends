# Credit shop categories and items.
# Each category appears as a clickable item in the main shop menu.
# Each item within a category can be purchased with credits.
#
# item types: RANK, CRATE, COSMETIC, RANK_UPGRADE
# For RANK items, "value" is the rank id passed to GrantService.
# For CRATE items, "value" is the crate definition id.
# For COSMETIC items, "value" is the cosmetic id.
# For RANK_UPGRADE items, "value" is the target rank id.

shop:
  categories:
    ranks:
      display-name: "Ranks"
      material: "DIAMOND"
      slot: 11
      items:
        initiate:
          display-name: "Initiate Rank"
          material: "IRON_INGOT"
          cost: 500
          type: "RANK"
          value: "initiate"
          lore:
            - "&7Your first step into the network."
            - "&7• Basic chat colors"
            - "&7• Access to /creditshop perks"
        champion:
          display-name: "Champion Rank"
          material: "LAPIS_LAZULI"
          cost: 1500
          type: "RANK"
          value: "champion"
          lore:
            - "&7Stand above the crowd."
            - "&7• Cyan chat colors"
            - "&7• Access to cosmetics"
            - "&7• All Initiate perks"
        elite:
          display-name: "Elite Rank"
          material: "AMETHYST_SHARD"
          cost: 3500
          type: "RANK"
          value: "elite"
          lore:
            - "&7Join the elite few."
            - "&7• Purple chat colors"
            - "&7• All Champion perks"
        legend:
          display-name: "Legend Rank"
          material: "BLAZE_POWDER"
          cost: 7500
          type: "RANK"
          value: "legend"
          lore:
            - "&7Become a legend on the network."
            - "&7• Orange chat colors"
            - "&7• All Elite perks"
        titan:
          display-name: "Titan Rank"
          material: "NETHERITE_INGOT"
          cost: 15000
          type: "RANK"
          value: "titan"
          lore:
            - "&7Towering above the rest."
            - "&7• Pink chat colors"
            - "&7• Premium cosmetics"
            - "&7• All Legend perks"
        mythic:
          display-name: "Mythic Rank"
          material: "NETHER_STAR"
          cost: 35000
          type: "RANK"
          value: "mythic"
          lore:
            - "&#FFD700&l✦ The pinnacle of MythicPvP. ✦"
            - "&7• All chat color permissions"
            - "&7• Exclusive Mythic-tier cosmetics"
            - "&7• Custom chat formatting"
            - "&7• All Titan perks"

    crates:
      display-name: "Crates"
      material: "ENDER_CHEST"
      slot: 13
      items:
        common_crate:
          display-name: "Common Crate"
          material: "CHEST"
          cost: 150
          type: "CRATE"
          value: "common_crate"
          lore:
            - "&7A common cosmetic crate."
        rare_crate:
          display-name: "Rare Crate"
          material: "ENDER_CHEST"
          cost: 500
          type: "CRATE"
          value: "rare_crate"
          lore:
            - "&7A rare cosmetic crate."
        legendary_crate:
          display-name: "Legendary Crate"
          material: "DRAGON_EGG"
          cost: 1200
          type: "CRATE"
          value: "legendary_crate"
          lore:
            - "&7A legendary cosmetic crate."

    rank_upgrades:
      display-name: "Rank Upgrades"
      material: "NETHER_STAR"
      slot: 15
      items:
        initiate_to_champion:
          display-name: "Initiate → Champion"
