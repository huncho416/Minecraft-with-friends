# Chat-filter definitions used by the in-game public chat.
# Each filter has:
#   id      (numeric key)
#   title   (human-readable label shown in /history and staff notifications)
#   type    LITERAL or REGEX
#   pattern the word to match (literal) or a Java regex
#   auto-punish  when false, every match only warns + warns the player;
#                when true, repeated matches escalate per the ladder below:
#                  1st  : silent warn + history entry
#                  2nd  : 15-minute mute
#                  3rd  : 3-hour mute
#                  4th  : 24-hour mute
#                  5th  : 7-day mute
#                  6th  : 30-day mute
#                  7th  : 365-day mute (final warning shown beforehand)
#                  8th+ : permanent mute
#
# Literal matches are made case-insensitive AND tolerate spaces, punctuation,
# digit-substitution attempts, etc. between letters (so "b a d" or "b@d"
# still matches "bad"). For more precise control, use REGEX.
#
# Operators with the permission mythic.core.chatfilter.bypass skip filtering.
# Operators with mythic.core.chatfilter.manage can use /filter and /filters.
#
# This file is rewritten by /filter add/remove and the /filters GUI, so any
# comments at the top of an in-game-modified file will be lost.

filters:
  1:
    title: "Slur (n-word)"
    type: LITERAL
    pattern: "nigger"
    auto-punish: true
  2:
    title: "Slur (f-word)"
    type: LITERAL
    pattern: "faggot"
    auto-punish: true
  3:
    title: "Advertising"
    type: REGEX
    pattern: "\\b(?:join|play|come\\s+to)\\s+(?:my|our)?\\s*(?:server|ip)\\b"
    auto-punish: false
