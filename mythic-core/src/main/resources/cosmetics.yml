# Cosmetic catalog — loaded by CosmeticCatalogLoader at startup.
# Each entry under a type key becomes a registered Cosmetic in CosmeticManager.
# The optional `format` field is a MiniMessage-friendly string (supports <gradient>
# tags and &#RRGGBB hex codes). For CHAT_TAG entries it is rendered before the
# player name in chat. For CHAT_COLOR entries it must contain the literal token
# %message% — the player's chat body is substituted in at render time.
