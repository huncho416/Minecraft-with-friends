# Network-wide command blocker for `mythic-core`.
#
# - `blocked-commands` are hidden entirely from `/` tab-complete and
#   reject execution with `messages.blocked`.
# - `required-permissions` gates a command behind a permission node.
#   Players without the node can't see or execute it.
# - Bypass: `bypass-permission` skips both checks (e.g. owners).
#
# Reload at runtime via `/mythic reload` or by editing this file and
# restarting. The blocker fires on PlayerCommandPreprocess (execute),
# PlayerCommandSend (tab list filtering), and TabCompleteEvent.

enabled: true
hide-no-permission: true
bypass-permission: mythic.commandblocker.bypass

messages:
  blocked: "&#FF8A8AUnknown command."

# Block server fingerprinting and noisy info commands. Most of these
# leak plugin identity, server software, or player data we don't want
# casual users to see.
blocked-commands:
  - "pl"
  - "plugins"
  - "bukkit:pl"
  - "bukkit:plugins"
  - "?"
  - "help"
  - "bukkit:?"
  - "bukkit:help"
  - "minecraft:help"
  - "version"
  - "ver"
  - "bukkit:version"
  - "bukkit:ver"
  - "icanhasbukkit"
  - "about"
  - "bukkit:about"
  - "tps"
  - "mem"
  # Chat-bypass guard. ChatGuard only sees AsyncChatEvent — these commands
  # emit chat through different code paths and would otherwise let players
  # talk while chat is muted/slowed, or DM via Minecraft's built-in path
  # instead of mythic-core's PrivateMessageCommand. The vanilla `me` and
  # `say` are blocked outright; the namespaced versions of mythic-core's
  # /msg /tell /w /r aliases (minecraft:tell etc.) are blocked so they
  # can't sidestep mute by going through Bukkit's default impl.
  - "me"
  - "minecraft:me"
  - "say"
  - "minecraft:say"
  - "minecraft:tell"
  - "minecraft:msg"
  - "minecraft:w"
  - "minecraft:teammsg"
  - "minecraft:tm"
  - "teammsg"
  - "tm"

# Permission gates for staff-only commands. Ops bypass via the bypass
# permission. Each entry is `<command-with-namespace?>: <permission>`.
required-permissions:
  # Staff diagnostics (visible to admins only).
  pl: "mythic.admin.commands.plugins"
  plugins: "mythic.admin.commands.plugins"
  "bukkit:pl": "mythic.admin.commands.plugins"
  "bukkit:plugins": "mythic.admin.commands.plugins"
  "?": "mythic.admin.commands.help"
  help: "mythic.admin.commands.help"
  "bukkit:?": "mythic.admin.commands.help"
  "bukkit:help": "mythic.admin.commands.help"
  "minecraft:help": "mythic.admin.commands.help"
  version: "mythic.admin.commands.version"
  ver: "mythic.admin.commands.version"
  "bukkit:version": "mythic.admin.commands.version"
  "bukkit:ver": "mythic.admin.commands.version"
  "bukkit:about": "mythic.admin.commands.version"
  tps: "mythic.admin.commands.tps"
  mem: "mythic.admin.commands.tps"

