# Crate definitions — loaded by CrateService at startup.
# Each crate has a cost, currency, and weighted cosmetic pool.
crates:
  common_crate:
    display-name: "Common Crate"
    cost: 100
    currency: "COINS"
    pool:
      - cosmetic-id: "particle_hearts"
        weight: 40
      - cosmetic-id: "tag_vip"
        weight: 40
      - cosmetic-id: "particle_flames"
        weight: 20
  rare_crate:
