        weight: 30
      - cosmetic-id: "particle_flames"
        weight: 25
      - cosmetic-id: "tag_mvp"
        weight: 25
      - cosmetic-id: "win_fireworks"
        weight: 20
  legendary_crate:
    display-name: "Legendary Crate"
    cost: 200
    currency: "GEMS"
    pool:
      - cosmetic-id: "hat_crown"
        weight: 15
      - cosmetic-id: "kill_lightning"
        weight: 25
      - cosmetic-id: "hat_halo"
        weight: 30
      - cosmetic-id: "win_fireworks"
        weight: 30
