# Staff-mode configuration. Toggled via /staffmode (alias /sm).
#
# When a staff member enables staff mode, their current inventory and
# state (gamemode, fly, allow-fly) are snapshotted to memory and the
# tool palette below is given to them. /staffmode again restores
# everything. The snapshot is also persisted-in-memory across plugin
# reloads via SafeRestoreListener so a crash mid-staff-mode doesn't
# eat anyone's hotbar.
staff-mode:
  vanish: true
  fly: true
  # Bukkit Material name for each tool. Slot is the hotbar position
  # 0..8. Type is one of INSPECT, FREEZE, RANDOM_TELEPORT - recognized
  # by StaffModeTools.
  tools:
    - { slot: 0, material: "BOOK",        name: "&#F529BEInspect",       type: "INSPECT" }
    - { slot: 1, material: "ICE",         name: "&#F529BEFreeze",        type: "FREEZE" }
    - { slot: 2, material: "COMPASS",     name: "&#F529BERandom TP",     type: "RANDOM_TELEPORT" }
    - { slot: 8, material: "BARRIER",     name: "&#F529BEDisable Mode",  type: "DISABLE" }

messages:
  enabled: "&#F529BE&lM&#FD37F0&ly&#F639EA&lt&#DD35C4&lh&#F63DF1&li&#EA21FF&lc&#FFFFFF&lP&#D2D8E0&lv&#DDDBD9&lP  &8» &#9CFF9CStaff mode enabled."
  disabled: "&#F529BE&lM&#FD37F0&ly&#F639EA&lt&#DD35C4&lh&#F63DF1&li&#EA21FF&lc&#FFFFFF&lP&#D2D8E0&lv&#DDDBD9&lP  &8» &#9CFF9CStaff mode disabled."
  not-online: "&#F529BE&lM&#FD37F0&ly&#F639EA&lt&#DD35C4&lh&#F63DF1&li&#EA21FF&lc&#FFFFFF&lP&#D2D8E0&lv&#DDDBD9&lP  &8» &#FF8A8AThat player is not online."
  inspect: "&#F529BE&lM&#FD37F0&ly&#F639EA&lt&#DD35C4&lh&#F63DF1&li&#EA21FF&lc&#FFFFFF&lP&#D2D8E0&lv&#DDDBD9&lP  &8» &#FFFFFF%target%: rank=%rank% gamemode=%gamemode%"
  frozen: "&#F529BE&lM&#FD37F0&ly&#F639EA&lt&#DD35C4&lh&#F63DF1&li&#EA21FF&lc&#FFFFFF&lP&#D2D8E0&lv&#DDDBD9&lP  &8» &#9CFF9CFroze &#FFFFFF%target%&#9CFF9C."
  unfrozen: "&#F529BE&lM&#FD37F0&ly&#F639EA&lt&#DD35C4&lh&#F63DF1&li&#EA21FF&lc&#FFFFFF&lP&#D2D8E0&lv&#DDDBD9&lP  &8» &#9CFF9CUnfroze &#FFFFFF%target%&#9CFF9C."
