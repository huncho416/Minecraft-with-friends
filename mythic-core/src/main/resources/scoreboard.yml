    lines:
      - "&#F529BE&lR&#FD37F0&la&#F639EA&ln&#DD35C4&lk&8: &#FFFFFF%rank%"
      - "&#F529BE&lA&#FD37F0&lr&#F639EA&le&#DD35C4&ln&#F63DF1&la&8: &#D2D8E0%server%"
