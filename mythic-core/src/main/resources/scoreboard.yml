# Available placeholders:
#   %player%, %rank%, %rank_id%, %rank_color%, %server%, %online%,
#   %chat_prefix%, %tab_prefix%, %nametag_prefix%, %prefix%, %suffix%,
#   %cosmetic_chat_tag%, %cosmetic_title%, %queue_position%, %queue_section%
# %queue_position% renders as "#N" while a player is queued for transfer
# and is empty otherwise.
# %queue_section% is the conditional version: when not queued the line
# is dropped entirely (so spacing collapses); when queued it expands to
# a 2-line block with a leading blank space and the formatted queue
# status. Use it on its own line in the layout.
# When PlaceholderAPI is installed, %papi_*% tokens resolve too.
scoreboard:
  title: "&#F529BE&lM&#FD37F0&ly&#F639EA&lt&#DD35C4&lh&#F63DF1&li&#EA21FF&lc&#FFFFFF&lP&#D2D8E0&lv&#DDDBD9&lP"
  lines:
    - "&#F529BE&lR&#FD37F0&la&#F639EA&ln&#DD35C4&lk&8: &#FFFFFF%rank%"
    - "&#F529BE&lS&#FD37F0&le&#F639EA&lr&#DD35C4&lv&#F63DF1&le&#EA21FF&lr&8: &#D2D8E0%server%"
    - "&#F529BE&lO&#FD37F0&ln&#F639EA&ll&#DD35C4&li&#F63DF1&ln&#EA21FF&le&8: &#FFFFFF%online%"

# Per-gamemode overrides. The key is matched as a case-insensitive prefix
# against the server identity id (server-identity.yml). First match wins,
# falling back to the top-level `scoreboard:` block above. Add new entries
# for new server families without touching code.
