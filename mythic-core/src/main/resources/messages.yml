# Network-wide message strings.
#
# Style guide:
#   - No bold (&l). Rank prefixes in ranks.yml may use bold for branding;
#     plugin chat output should not.
#   - No long brand banner. Use a short colored accent if a message benefits
#     from one, otherwise let the content speak for itself.
#   - Hex theme colors are MythicPvP pink/violet/aqua/grey. Keep success
#     messages on &#9CFF9C, errors on &#FF8A8A, neutral info on &#D2D8E0,
#     values on &#FFFFFF.
#   - The `messages.prefix` value is intentionally short — it's used by
#     CommandManager fallbacks. Leave empty if you don't want any accent.

messages:
  prefix: ""
  command:
    player-only: "&#FF8A8AThis command can only be used by players."
    no-permission: "&#FF8A8AUnknown command."
    usage: "&#FF8A8AUsage: &#FFFFFF%usage%"
    player-not-found: "&#FF8A8AThat player is not online."
  links:
    discord: "&#D2D8E0Discord: &#FFFFFFhttps://discord.gg/mythicpvp"
    help:
      - "&#D2D8E0Help"
      - "&#D2D8E0Use &#FFFFFF/discord &#D2D8E0for community support."
  essentials:
    invalid-gamemode: "&#FF8A8AUnknown gamemode."
    gamemode: "&#9CFF9CSet &#FFFFFF%target%&#9CFF9C's gamemode to &#FFFFFF%mode%&#9CFF9C."
    gamemode-received: "&#9CFF9CYour gamemode was set to &#FFFFFF%mode%&#9CFF9C."
    teleport: "&#9CFF9CTeleported &#FFFFFF%target% &#9CFF9Cto &#FFFFFF%destination%&#9CFF9C."
    tphere: "&#9CFF9CTeleported &#FFFFFF%target% &#9CFF9Cto you."
  staff:
    format: "&#D2D8E0[%server%] %channel_tag% %chat_prefix%%sender% &8» &#FFFFFF%message%"
    join: "&#D2D8E0[%server%] &#888888[&#FFEC8A%rank%&#888888] %rank_color%%sender% &#9CFF9Cjoined."
    quit: "&#D2D8E0[%server%] &#888888[&#FFEC8A%rank%&#888888] %rank_color%%sender% &#FF8A8Adisconnected."
    switch: "&#D2D8E0[%from% -> %to%] &#888888[&#FFEC8A%rank%&#888888] %rank_color%%sender% &#FFFFFFswitched servers."
  punishment:
    executed: "&#9CFF9C%type% issued for &#FFFFFF%target%&#9CFF9C."
    silent-executed: "&#9CFF9CSilent %type% issued for &#FFFFFF%target%&#9CFF9C."
    broadcast: "&#FFFFFF%target% was punished for %reason%."
    history-empty: "&#FF8A8ANo punishment history found for &#FFFFFF%target%&#FF8A8A."
    login-banned: "&#FF8A8AYou are banned: &#FFFFFF%reason% &#D2D8E0(%expiry%)"
    login-blacklisted: "&#FF8A8AYou are blacklisted from this network."
    appeal-usage: "&#FF8A8AUsage: &#FFFFFF/appeal <message...>"
    appeal-none: "&#FF8A8AYou have no active punishment to appeal."
    appeal-filed: "&#9CFF9CYour appeal for punishment &#FFFFFF#%id% &#9CFF9Chas been filed."
    appeal-reviewed: "&#FFFFFFAppeal #%id% %decision%."
    appeals-usage: "&#FF8A8AUsage: &#FFFFFF/appeals review <approve|deny> <appealId> [notes...]"
  chat-control:
    muted: "&#9CFF9CChat has been muted."
    unmuted: "&#9CFF9CChat has been unmuted."
    slowed: "&#9CFF9CChat slow mode is now &#FFFFFF%seconds%s&#9CFF9C."
    slowed-off: "&#9CFF9CChat slow mode is off."
    cleared: "&#9CFF9CChat has been cleared."
    blocked-muted: "&#FF8A8AChat is currently muted."
    blocked-slow: "&#FF8A8ASlow mode active. Wait &#FFFFFF%seconds%s &#FF8A8Abefore sending again."
    status: "&#FFFFFFmuted=%muted% slow=%seconds%s scope=%scope%"
    usage: "&#FF8A8AUsage: &#FFFFFF/chat <mute|unmute|slow|clear|status> [seconds] [local|network]"
  staff-mode:
    enabled: "&#9CFF9CStaff mode enabled."
    disabled: "&#9CFF9CStaff mode disabled."
    inspect: "&#FFFFFF%target%: rank=%rank% gamemode=%gamemode%"
    frozen: "&#9CFF9CFroze &#FFFFFF%target%&#9CFF9C."
    unfrozen: "&#9CFF9CUnfroze &#FFFFFF%target%&#9CFF9C."
  social:
    friend-usage: "&#FF8A8AUsage: &#FFFFFF/friend <add|accept|deny|remove|list|requests>"
    friend-self: "&#FF8A8AYou cannot add yourself as a friend."
    friend-request-sent: "&#9CFF9CFriend request sent to &#FFFFFF%target%&#9CFF9C."
    friend-request-received: "&#FFFFFF%sender% &#9CFF9Csent you a friend request. &#FFFFFF/friend accept %id%"
    friend-request-missing: "&#FF8A8AThat friend request was not found."
    friend-accepted: "&#9CFF9CFriend request accepted."
    friend-not-found: "&#FF8A8AThat player is not on your friends list."
    friend-denied: "&#9CFF9CFriend request denied."
    friend-removed: "&#9CFF9CFriend removed."
    friend-list: "&#FFFFFFYou have &#D2D8E0%count% &#FFFFFFfriends."
    friend-list-entry: "&#D2D8E0 - &#FFFFFF%name% %status%"
    friend-requests: "&#FFFFFFYou have &#D2D8E0%count% &#FFFFFFpending friend requests."
    friend-request-entry: "&#D2D8E0 - &#FFFFFF%sender% &#D2D8E0(id: %id%) &#FFFFFF/friend accept %id%"
    friend-online: "&#FFFFFF%player% &#9CFF9Cis now online."
    party-usage: "&#FF8A8AUsage: &#FFFFFF/party <create|invite|join|leave|disband|info|chat>"
    party-created: "&#9CFF9CParty created. Party id: &#FFFFFF%id%&#9CFF9C."
    party-leader-only: "&#FF8A8AYou must lead a party to do that."
    party-invite: "&#FFFFFF%sender% &#9CFF9Cinvited you to party &#FFFFFF%id%&#9CFF9C. Use &#FFFFFF/party join %id%&#9CFF9C."
    party-invite-sent: "&#9CFF9CParty invite sent to &#FFFFFF%target%&#9CFF9C."
    party-join-failed: "&#FF8A8AUnable to join that party."
    party-joined: "&#9CFF9CJoined party &#FFFFFF%id%&#9CFF9C."
    party-none: "&#FF8A8AYou are not in a party."
    party-left: "&#9CFF9CYou left the party."
    party-disbanded: "&#9CFF9CParty disbanded."
    party-info: "&#FFFFFFParty &#D2D8E0%id% &#FFFFFFhas &#D2D8E0%count% &#FFFFFFmembers."
    party-member-entry: "&#D2D8E0 - &#FFFFFF%name% %role%"
    party-chat: "&#D2D8E0[Party] &#FFFFFF%sender% &8» &#D2D8E0%message%"
    party-chat-usage: "&#FF8A8AUsage: &#FFFFFF/party chat <message>"
    mail-usage: "&#FF8A8AUsage: &#FFFFFF/mail <send|inbox|read>"
    mail-sent: "&#9CFF9CMail sent to &#FFFFFF%target%&#9CFF9C."
    mail-login: "&#FFFFFFYou have &#D2D8E0%count% &#FFFFFFunread mail."
    mail-inbox: "&#FFFFFFInbox: &#D2D8E0%count% &#FFFFFFmessages, &#D2D8E0%unread% &#FFFFFFunread."
    mail-entry: "&#D2D8E0#%id% &#FFFFFF%subject%"
    mail-missing: "&#FF8A8AMail not found."
    mail-read: "&#FFFFFF%body%"
    login-streak: "&#9CFF9CLogin streak: &#FFFFFF%streak% &#9CFF9Cdays!"
