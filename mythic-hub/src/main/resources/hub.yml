# Hub configuration — operator-facing settings for spawn, selector, and activities.
spawn:
  world: "world"
  x: 0.5
  y: 100.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0
  void-teleport-y: -10.0

# Server selector groups displayed in /servers menu.
# Each `role` is matched (case-insensitive) against the STDB
# `server_registry.role` column populated by mythic-core's
# registry heartbeat. Servers in the registry are auto-discovered
# and grouped by role; the entries below define the icon + label
# shown for each group. The HUB role is intentionally absent — players
# return to a hub via the dedicated beacon at hotbar slot 9, not the
# gamemode selector.
selector:
  groups:
    - role: "SKYBLOCK"
      display-name: "&#9CFF9CSkyblock Realms"
      material: "GRASS_BLOCK"
      tagline: "&#9CFF9CIslands, economies, and endless progression."
      release-date: "May 2026"
      age: "Brand new"
      lore:
        - "&7Carve out your own floating island, automate"
        - "&7crops and minions, raid bosses, and trade with"
        - "&7the player-run market. Co-op friendly with a"
        - "&7full party + warp system."
        - ""
        - "&7Released: &f%release_date%"
        - "&7Age: &f%age%"
        - "&7Online servers: &f%servers%"
        - "&7Players online: &f%players%"
        - ""
        - "&#9CFF9CClick to join the queue"

# Hub activities.
activities:
  double-jump:
    enabled: true
    velocity: 1.5
    upward: 0.8
  launch-pads:
    enabled: true
    velocity: 2.5
    upward: 1.0
    material: "SLIME_BLOCK"
